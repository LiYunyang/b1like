# needed so that b1like initializes knowing what parameters the cobaya yaml likelihood block should have

path: null
dataset_file: null
dataset_params:
    maps_use: [CMB_B, Dust_B, Sync_B, LT_B]
    use_min: 1
    use_max: 9
map_separator: x
l_max: 600
speed: 90

params:
    Al_scale:
        value: 1
        latex: A_L
    r:
        value: 0
        latex: r
    BBdust:
        value: 4.3
        latex: A_{B,\mathrm{dust}}
    BBalphadust:
        value: -0.4
        latex: \alpha_{B,\mathrm{dust}}
    BBsync:
        value: 0.6
        latex: A_{B,\mathrm{sync}}
    BBalphasync:
        value: -0.6
        latex: \alpha_{B,\mathrm{sync}}
    epsilon:
        value: 0
        latex: \epsilon
    BBddust:
        value: 0
        latex: B_{B,\delta\mathrm{dust}}
    BBgammaddust:
        value: -3
        latex: \Gamma_{B,\delta\mathrm{dust}}
